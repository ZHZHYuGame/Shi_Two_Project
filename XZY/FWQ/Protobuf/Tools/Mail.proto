syntax="proto3";
package Games;

//玩家当前状态
enum MainType
{
	 log=0;//登录
	 system=1;//系统
         noline=2;//在线
         friend=3;//好友
         activity=4;//活动
}

//客户端向服务器请求邮件信息
message C_To_S_Mail
{
	 MainType type=1;
}

//邮件信息
message MailData
{
        int32 mailID = 1;
	MailBaseData data=2;
        bool isRead=3;
}

//邮件数据
message MailBaseData
{
        int32 emailID = 1;
	string title=2;
        string content=3;
        bool isAward=4;
        repeated int32 awardList=5;
	string startTime=6;
        string endTime=7;
}

//返回当前所有的邮件信息
message S_To_C_Mail
{
	 repeated MailData mailData=1;
}
