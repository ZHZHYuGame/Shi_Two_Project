syntax = "proto3";  ///代表使用的是protoBuffer 3.0版本
package mygame;

////==========登录相关消息=========
///   登录，， 客户端      --》服务器
message LoginMsg
{
	  string username = 1; //用户名
}

///登录的返回  服务器---》客户端
message  LoginReturnMsg
{
	bool result = 1;  //结果   true登录成功  false登录失败
	string username = 2; ///登录的用户名
}



 ///=========物体同步=========
///位置的改变，客户端---》服务器   服务器广播给所有客户端
message SyncPosMsg
{
	string username = 1;
	Vec3  position = 4;  //需要同步的位置。	
	Vec3 dir   = 5;
}

///状态的同步，客户端---》服务器   服务器广播给所有客户端
message SyncStateMsg
{
	string username = 1;
	int32  state = 5;   //需要同步的动画 1 run        ,  2 idle    ,3 attack
}
//攻击到之后，发送的消息。
message AttackMsg
{
	string username = 1;
	int32    socre = 2;  //分数
	int32    hp = 3;  //掉血量
	string   targetName = 4;  //被攻击的对象。客户端收到服务器转发的消息，界面上。找到游戏对象进行减血？
}

//位置类
message Vec3
{
	float x = 1;
	float y =2;
 	float z = 3;
}