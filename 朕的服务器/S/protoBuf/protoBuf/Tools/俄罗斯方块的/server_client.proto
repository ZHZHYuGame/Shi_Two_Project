syntax = "proto3";
package mygame;
///客户端----> 服务器发的登录消息
message LoginMsg
{
 	string username = 1;  ///
}

//服务器----》客户端     登录返回消息
message LoginReturnMsg
{
   bool result = 1; //登录结果
    string username = 2; ///登录成功的用户名
}


///服务器 --- 》客户端
//当服务器端的房间信息发生改变时，例如 创建房间，有人加入房间，房间解散
///或者用户刚登陆时，由服务器下发的消息。
message RoomListMsg
{
     repeated RoomInfo roomList = 1; ///房间列表信息里的房间内容。
}

///客户端--》服务器   请求创建房间的消息
message CreateRoomMsg
{
	string username = 1;  //客户端的用户名
}
///服务器  _----->客户端
message CreateRoomReturnMsg
{
	bool result = 1;  //创建房间的结果，
	RoomInfo  roomInfo= 2;  //所创建房间的数据。
}
/// 客户端---》服务器  加入房间消息
message JoinRoomMsg
{
	string username = 1; //跟服务器说，我的名字
	int32 roomID = 2;  //我要加入的房间
}

///服务器 -- 》客户端 加入房间的返回。
message JoinRoomReturnMsg
{
	bool result = 1;  //加入房间的结果，
	RoomInfo  roomInfo= 2;  ///所加入房间的数据。
}

///单个房间的信息
message RoomInfo
{
	int32 roomID =1; 		//房间id
	string name=2;		 //房间名字
       	repeated string userList = 3;   //房间内包含的客户端的名字。
}

///   客户端 -- 》服务器    服务器转发   
///玩法中进行同步用的消息，服务器需要在房间内进行转发的
message GameSyncMsg
{
	int32   roomID = 1; ///必须有房间id，因为服务器要根据房间id来转发消息。
	string username  =2;  ///必须得，用来区分不同用户的。
	SyncType type = 3; //通知的同步类型，
	int32  createBoxType = 4;  ///如果是创建，那么带着创建的方块类型。
}

///客户端  ——》 服务器，客户端通知服务器，房间解散
message RoomDismiss
{
	string username = 1;
	int32 roomID = 2;
}

 enum SyncType
{
	CreateBox = 0; //创建方块
	LeftMove =1;  
	RightMove = 2;
	DownMove = 3;
	UpMove = 4;
	SetBox = 5;
	Rotate = 6;
	GameOver = 7;

}
 

